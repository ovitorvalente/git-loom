name: tag-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versao manual (ex: v1.2.3). Deixe vazio para auto-detectar via conventional commits."
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-detect version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$INPUT_VERSION" ]; then
            # Versao manual
            case "$INPUT_VERSION" in
              v*) ;;
              *) INPUT_VERSION="v${INPUT_VERSION}" ;;
            esac
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            echo "source=manual" >> "$GITHUB_OUTPUT"
          else
            # Auto-detect via conventional commits
            PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
            if [ -z "$PREV_TAG" ]; then
              PREV_TAG="v0.0.0"
              RANGE="HEAD"
            else
              RANGE="${PREV_TAG}..HEAD"
            fi

            # Extrair versao atual
            MAJOR=$(echo "$PREV_TAG" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$PREV_TAG" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$PREV_TAG" | sed 's/^v//' | cut -d. -f3)

            # Verificar breaking changes
            HAS_BREAKING=$(git log --pretty=format:"%s" $RANGE | grep -ciE "BREAKING CHANGE|^[a-z]+(\(.+\))?!:" || true)

            # Verificar features
            HAS_FEAT=$(git log --pretty=format:"%s" $RANGE | grep -ciE "^feat" || true)

            if [ "$HAS_BREAKING" -gt 0 ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif [ "$HAS_FEAT" -gt 0 ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

            # Verificar se ja existe
            if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
              echo "ERROR: Tag $NEW_VERSION ja existe. Nenhum commit novo desde a ultima release."
              exit 1
            fi

            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "source=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Show version
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Source: ${{ steps.version.outputs.source }}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
